<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crea il tuo Piatto Equilibrato</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');
        
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: linear-gradient(135deg, #fff5f7 0%, #f0f4ff 100%);
            min-height: 100vh;
            color: #2d3748;
        }

        /* Pulsanti Cibo Stile "Cute" */
        .food-card {
            background: rgba(255, 255, 255, 0.8);
            border: 2px solid transparent;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            cursor: pointer;
            border-radius: 2.5rem;
            box-shadow: 0 8px 15px -3px rgba(0, 0, 0, 0.05);
        }

        .food-card:hover {
            transform: translateY(-8px) scale(1.05);
            background: #ffffff;
            box-shadow: 0 20px 25px -5px rgba(255, 182, 193, 0.3);
            border-color: #ffb6c1;
        }

        .food-card:active {
            transform: scale(0.9);
        }

        .food-emoji {
            font-size: 3rem;
            filter: drop-shadow(0 4px 4px rgba(0,0,0,0.1));
        }

        /* Estetica del Piatto Kawaii */
        .plate-container {
            position: relative;
            width: 340px;
            height: 340px;
            background: white;
            border-radius: 50%;
            box-shadow: 
                0 30px 60px -12px rgba(164, 172, 255, 0.3), 
                inset 0 -8px 0 rgba(0,0,0,0.02);
            border: 18px solid #f8fafc;
            display: flex;
            flex-wrap: wrap;
            align-content: center;
            justify-content: center;
            padding: 30px;
            gap: 12px;
        }

        /* Pulsanti di Azione più carini */
        .btn-cute {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            font-weight: 800;
            border-radius: 2rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .btn-cute:hover {
            transform: scale(1.05);
            filter: brightness(1.05);
        }

        .btn-cute-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            box-shadow: 0 10px 20px -5px rgba(118, 75, 162, 0.4);
        }

        .btn-cute-secondary {
            background: white;
            border: 3px solid #edf2f7;
            color: #4a5568;
        }

        /* Animazioni */
        .in-plate-emoji {
            font-size: 3.5rem;
            animation: pop 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes pop {
            0% { transform: scale(0) rotate(-20deg); opacity: 0; }
            80% { transform: scale(1.2) rotate(10deg); }
            100% { transform: scale(1) rotate(0); opacity: 1; }
        }

        .custom-scroll::-webkit-scrollbar {
            width: 10px;
        }
        .custom-scroll::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 20px;
            border: 3px solid white;
        }
    </style>
</head>
<body class="p-4 md:p-10 flex items-center justify-center">

    <div class="max-w-7xl w-full grid grid-cols-1 lg:grid-cols-12 gap-8 bg-white/40 backdrop-blur-2xl p-6 md:p-10 rounded-[4rem] shadow-[0_32px_64px_-15px_rgba(0,0,0,0.1)] border border-white/60">
        
        <!-- Selezione Cibo -->
        <div class="lg:col-span-7 bg-white/90 rounded-[3.5rem] p-8 shadow-inner flex flex-col h-[700px] md:h-[800px]">
            <div class="flex flex-col md:flex-row items-center justify-between mb-10 px-2 gap-6">
                <div>
                    <h2 class="text-4xl font-black text-slate-800 tracking-tighter">Gnam Gnam! 🍭</h2>
                    <p class="text-slate-400 font-bold mt-2">Crea la tua ricetta magica!</p>
                </div>
                <div id="error-badge" class="bg-white border-2 border-slate-100 text-slate-300 px-6 py-3 rounded-full text-sm font-black uppercase tracking-tighter shadow-sm transition-all duration-300">
                    Errori: 0/3
                </div>
            </div>
            
            <div id="food-grid" class="grid grid-cols-2 sm:grid-cols-3 gap-6 overflow-y-auto pr-4 custom-scroll">
                <!-- Generato da JS -->
            </div>
        </div>

        <!-- Piatto e Azioni -->
        <div class="lg:col-span-5 flex flex-col items-center justify-center py-6 px-4">
            <div class="text-center mb-12">
                <span class="bg-pink-100 text-pink-500 px-6 py-2 rounded-full text-xs font-black tracking-widest uppercase mb-4 inline-block">Cibo Sano & Felice</span>
                <h1 class="text-5xl font-black text-slate-900 tracking-tighter leading-none">Il Mio Piatto</h1>
            </div>

            <!-- Il Piatto -->
            <div class="relative mb-16">
                <div id="plate" class="plate-container">
                    <!-- Emojis appaiono qui -->
                </div>
                <div class="absolute -bottom-8 left-1/2 -translate-x-1/2 bg-indigo-500 text-white px-10 py-3 rounded-full shadow-2xl text-xs font-black tracking-widest uppercase border-4 border-white">
                    Pronto a mangiare?
                </div>
            </div>

            <!-- Messaggi -->
            <div id="message-area" class="w-full h-28 flex items-center justify-center mb-10">
                <div id="message-text" class="text-center font-black transition-all duration-300 px-6"></div>
            </div>

            <!-- Pulsanti di Azione -->
            <div class="w-full space-y-5 max-w-sm">
                <div class="grid grid-cols-2 gap-5">
                    <button onclick="removeLast()" class="btn-cute btn-cute-secondary py-5 flex items-center justify-center gap-3">
                        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M9 14 4 9l5-5"/><path d="M4 9h10.5a5.5 5.5 0 0 1 5.5 5.5v0a5.5 5.5 0 0 1-5.5 5.5H11"/></svg>
                        Oops!
                    </button>
                    <button onclick="verifyPlate()" class="btn-cute btn-cute-primary text-white py-5 flex items-center justify-center gap-3">
                        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></svg>
                        Verifica
                    </button>
                </div>
                <button onclick="resetAll()" class="w-full py-2 text-slate-300 hover:text-red-400 font-black text-[10px] uppercase tracking-[0.3em] transition-colors">
                    Svuota tutto e rifai
                </button>
            </div>
        </div>
    </div>

    <script>
        const foods = [
            { name: "Spaghetti", emoji: "🍝", type: "carb" },
            { name: "Pane Fresco", emoji: "🥖", type: "carb" },
            { name: "Riso Gohan", emoji: "🍚", type: "carb" },
            { name: "Salmone", emoji: "🥩", type: "prot" },
            { name: "Pollo Arrosto", emoji: "🍗", type: "prot" },
            { name: "Uovo", emoji: "🥚", type: "prot" },
            { name: "Mela Rossa", emoji: "🍎", type: "fruit" },
            { name: "Pesca Rosa", emoji: "🍑", type: "fruit" },
            { name: "Pera Dolce", emoji: "🍐", type: "fruit" },
            { name: "Banana Gialla", emoji: "🍌", type: "fruit" },
            { name: "Mandarino", emoji: "🍊", type: "fruit" },
            { name: "Broccoletto", emoji: "🥦", type: "veg" },
            { name: "Insalata Green", emoji: "🥗", type: "veg" },
            { name: "Carotina", emoji: "🥕", type: "veg" },
            { name: "Pomodorino", emoji: "🍅", type: "veg" },
            { name: "Olio", emoji: "🫒", type: "fat" }, // Nome cambiato da Oliva a Olio
            { name: "Sugo Rosso", emoji: "🍅", type: "sauce" },
            { name: "Foglia Pesto", emoji: "🍃", type: "sauce" },
            { name: "Uva Viola", emoji: "🍇", type: "fruit" },
            { name: "Ciliegina", emoji: "🍒", type: "fruit" },
            { name: "Fragolina", emoji: "🍓", type: "fruit" }
        ];

        let selectedFoods = [];
        let errors = 0;
        
        const grid = document.getElementById('food-grid');
        const plate = document.getElementById('plate');
        const msgText = document.getElementById('message-text');
        const badge = document.getElementById('error-badge');

        // Funzione per rimescolare l'array (Fisher-Yates Shuffle)
        function shuffle(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }

        function init() {
            grid.innerHTML = '';
            
            // Rimescola gli alimenti ogni volta che la funzione viene chiamata (all'avvio)
            const randomFoods = shuffle([...foods]);
            
            randomFoods.forEach(food => {
                const card = document.createElement('div');
                card.className = 'food-card p-6 flex flex-col items-center justify-center text-center';
                card.onclick = () => add(food);
                card.innerHTML = `
                    <span class="food-emoji mb-4">${food.emoji}</span>
                    <span class="text-xs font-black text-slate-600 uppercase tracking-tighter">${food.name}</span>
                `;
                grid.appendChild(card);
            });
        }

        function add(food) {
            if (selectedFoods.length >= 8) return;
            selectedFoods.push(food);
            renderPlate();
            clearMsg();
        }

        function removeLast() {
            selectedFoods.pop();
            renderPlate();
            clearMsg();
        }

        function resetAll() {
            selectedFoods = [];
            renderPlate();
            clearMsg();
        }

        function renderPlate() {
            plate.innerHTML = '';
            selectedFoods.forEach(f => {
                const el = document.createElement('span');
                el.className = 'in-plate-emoji';
                el.innerText = f.emoji;
                plate.appendChild(el);
            });
        }

        function clearMsg() {
            msgText.innerText = "";
            msgText.className = "text-center font-black transition-all duration-300 px-6";
        }

        function showMsg(text, type) {
            msgText.innerText = text;
            if (type === 'success') {
                msgText.className = "text-emerald-500 bg-emerald-50 px-8 py-5 rounded-[2.5rem] border-4 border-emerald-100 text-xl shadow-lg animate-bounce";
            } else if (type === 'error') {
                msgText.className = "text-orange-400 bg-orange-50 px-8 py-5 rounded-[2.5rem] border-4 border-orange-50 text-base";
            } else if (type === 'danger') {
                msgText.className = "text-white bg-red-500 px-8 py-6 rounded-[2.5rem] shadow-2xl text-2xl uppercase tracking-tighter scale-105 ring-8 ring-red-100";
            }
        }

        function verifyPlate() {
            const counts = { carb: 0, prot: 0, veg: 0, fruit: 0, fat: 0 };
            selectedFoods.forEach(f => {
                if (f.type === 'sauce') counts.carb++; 
                else counts[f.type]++;
            });

            const ok = counts.carb === 1 && counts.prot === 1 && counts.veg === 1 && counts.fruit === 1 && counts.fat === 1;

            if (ok && selectedFoods.length === 5) {
                showMsg("Yuppi! Pasto perfetto! 🌈✨", "success");
                errors = 0;
            } else {
                errors++;
                if (errors >= 3) {
                    showMsg("I tuoi pasti non sono stati equilibrati e stai male! 🤢🩹", "danger");
                    setTimeout(() => {
                        errors = 0;
                        resetAll();
                        updateBadge();
                    }, 4500);
                } else {
                    showMsg("Uh-oh! Prova a mettere un cibo per ogni tipo!", "error");
                }
            }
            updateBadge();
        }

        function updateBadge() {
            badge.innerText = `Errori: ${errors}/3`;
            if (errors >= 2) {
                badge.className = "bg-red-500 text-white border-2 border-red-400 px-6 py-3 rounded-full text-sm font-black uppercase tracking-tighter shadow-lg animate-pulse";
            } else if (errors === 1) {
                badge.className = "bg-orange-100 text-orange-500 border-2 border-orange-200 px-6 py-3 rounded-full text-sm font-black uppercase tracking-tighter shadow-sm";
            } else {
                badge.className = "bg-white border-2 border-slate-100 text-slate-300 px-6 py-3 rounded-full text-sm font-black uppercase tracking-tighter shadow-sm";
            }
        }

        // Inizializzazione al caricamento
        init();
    </script>
</body>
</html>
